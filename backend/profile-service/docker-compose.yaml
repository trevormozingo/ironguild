services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  profile-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: ironguild_test
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-client:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      SERVICE_URL: http://profile-service:8000
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: ironguild_test
    depends_on:
      profile-service:
        condition: service_healthy
