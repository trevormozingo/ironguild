services:
  mongodb:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--setParameter", "maxTransactionLockRequestTimeoutMillis=10000"]
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  mongo-express:
    image: mongo-express:1
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  firebase-emulator:
    build:
      context: ./firebase-emulator
    ports:
      - "9099:9099"
      - "9199:9199"
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:9099/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-service:
    build:
      context: ../profile-service
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: ironguild_test
      FIREBASE_PROJECT_ID: ironguild-local
      FIREBASE_STORAGE_BUCKET: ironguild-local.appspot.com
      STORAGE_EMULATOR_HOST: http://firebase-emulator:9199
      STORAGE_PUBLIC_HOST: http://192.168.1.16:9199
    depends_on:
      mongodb:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      FIREBASE_PROJECT_ID: ironguild-local
      PROFILE_SERVICE_URL: http://profile-service:8000
    depends_on:
      profile-service:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-client:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      GATEWAY_URL: http://api-gateway:8080
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      FIREBASE_PROJECT_ID: ironguild-local
    depends_on:
      api-gateway:
        condition: service_healthy
